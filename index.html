  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPG to PDF | Professional Image Converter</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #00ff88;
            --secondary: #60efff;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background: radial-gradient(circle at top, #1e293b, #0f172a);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            width: 95%;
            max-width: 500px;
            text-align: center;
            transition: 0.5s;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        p.subtitle { color: #94a3b8; font-size: 0.95rem; margin-bottom: 30px; }

        .upload-area {
            border: 2px dashed rgba(0, 255, 136, 0.3);
            border-radius: 20px;
            padding: 40px 20px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(0, 255, 136, 0.02);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(0, 255, 136, 0.08);
            transform: translateY(-5px);
        }

        #fileInput { display: none; }

        .main-btn {
            background: linear-gradient(135deg, #00ff88 0%, #00bd65 100%);
            color: #0f172a;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.2);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: none;
        }

        .main-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 255, 136, 0.4);
        }

        #preview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 25px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }

        .preview-img {
            width: 100%;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.05);
        }

        .success-msg {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 15px;
            color: var(--primary);
            font-weight: bold;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <h1>JPG to PDF</h1>
    <p class="subtitle">Convert and merge your images into one high-quality PDF document instantly.</p>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <div style="margin-top: 15px; font-weight: 500;">اضغط هنا لاختيار الصور</div>
    </div>

    <input type="file" id="fileInput" multiple accept="image/*" onchange="handleFiles(this.files)">

    <div id="preview"></div>

    <button id="actionBtn" class="main-btn" onclick="processImages()">Convert Images to PDF</button>

    <div id="successBox" class="success-msg">
    Conversion Successful! Your PDF is ready for download. ✅
</div>

</div>

<script>
    let selectedImages = [];
    let pdfDocument = null;

    function handleFiles(files) {
        const preview = document.getElementById('preview');
        const actionBtn = document.getElementById('actionBtn');
        const successBox = document.getElementById('successBox');
        
        preview.innerHTML = '';
        selectedImages = [];
        successBox.style.display = 'none';
        
        if (files.length > 0) {
            actionBtn.style.display = 'block';
            actionBtn.innerText = 'بدء عملية التحويل';
            actionBtn.style.background = 'linear-gradient(135deg, #00ff88 0%, #00bd65 100%)';
            actionBtn.onclick = processImages;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImages.push(e.target.result);
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = 'preview-img';
                    preview.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }
    }

    async function processImages() {
        const { jsPDF } = window.jspdf;
        const btn = document.getElementById('actionBtn');
        const successBox = document.getElementById('successBox');
        
        btn.innerText = 'جاري المعالجة...';
        btn.disabled = true;

        const doc = new jsPDF();
        
        // معالجة الصور وإضافتها للـ PDF
        for (let i = 0; i < selectedImages.length; i++) {
            if (i > 0) doc.addPage();
            
            const imgProps = doc.getImageProperties(selectedImages[i]);
            const pdfWidth = doc.internal.pageSize.getWidth();
            const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
            
            doc.addImage(selectedImages[i], 'JPEG', 0, 0, pdfWidth, pdfHeight);
        }

        pdfDocument = doc; // حفظ الملف في الذاكرة للتحميل

        // تحديث الواجهة بعد النجاح
        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = 'تحميل ملف الـ PDF الآن';
            btn.style.background = 'linear-gradient(135deg, #60efff 0%, #0061ff 100%)'; // تغيير اللون للتميز
            successBox.style.display = 'block';
            
            // تغيير وظيفة الزرار للتحميل الفعلي
            btn.onclick = () => {
                pdfDocument.save('Mina_Professional_Project.pdf');
                btn.innerText = 'تم التحميل! ابدأ من جديد؟';
                btn.onclick = () => location.reload();
            };
        }, 1500);
    }
</script>

</body>
</html>
    
  </body>
